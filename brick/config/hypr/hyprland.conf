#############
# Constants #
#############

# Keys
$mainMod = SUPER

# Programs
$term = foot
$launcher = wofi --show drun
$browser = firefox 
$fileExplorer = foot -e yazi

# Colors
$dark_bg=282828
$dark_fg=ebdbb2
$dark_red=cc241d
$dark_green=98971a
$dark_yellow=d79921
$dark_blue=458588
$dark_purple=b16286
$dark_aqua=689d6a
$dark_gray=a89984
$dark_gray_bright=928374
$dark_red_bright=fb4934
$dark_green_bright=b8bb26
$dark_yellow_bright=fabd2f
$dark_blue_bright=83a598
$dark_purple_bright=d3869b
$dark_aqua_bright=8ec07c
$dark_orange=d65d0e
$dark_orange_bright=fe8019


##############
# Auto-Start #
##############
exec-once=hyprpaper   # wallpaper
exec-once=mako        # notifications
exec-once=waybar      # topbar


#exec-once=hypridle
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY
#env = MOZ_ENABLE_WAYLAND,0
env = XDG_CURRENT_DESKTOP,Hyprland

xwayland {
    force_zero_scaling = true
}


###################
# Hardware config #
###################
monitor=DP-2, 2560x1440@143,0x0,1
monitor=HDMI-A-1, 1920x1080@60, 2560x0,1

env = XCURSOR_SIZE,24

input {
    kb_layout = ch
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

cursor {
    inactive_timeout = 2     # hides cursor after 2 seconds of inactivity
    no_hardware_cursors = true   # forces software cursor, which hides in XWayland games
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
#    workspace_swipe = on
}

#########################
# Window manager config #
#########################
general {
    layout = master

    border_size = 3
    gaps_in = 5
    gaps_out = 10

    col.active_border = rgba($dark_yellowff)
    col.inactive_border = rgba($dark_bgaa)
}

decoration {
    rounding = 1
    rounding_power = 4.0
    
    #inactive_opacity = 0.8
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

master {
    new_status = inherit
}

group {
  col.border_active = rgba($dark_yellowff)
  col.border_inactive = rgba($dark_bgaa)
  groupbar {
    enabled = yes
    height = 28
    gradients = true
    gradient_rounding = 6
    gradient_rounding_power = 4.0
    gradient_round_only_edges = false
    indicator_height = 0 
    
    gaps_in = 5
    gaps_out = 5
    keep_upper_gap = false

    font_family = monospace
    font_size = 18
    text_color = rgba($dark_bgff)
    text_color_inactive = rgba($dark_fgff)
    
    col.active = rgba($dark_yellowbb)
    col.inactive = rgba($dark_bgaa)

  }
}

################
# Window rules #
################
windowrule = match:tag fileExplorer, group set

#####################################
# KEY BINDS FOR WINDOWS INTERACTION #
#####################################

# Change Window mode
bind = $mainMod, D, layoutmsg, orientationcycle
bind = $mainMod, T, togglegroup,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,

# Cycle between windows
bind = $mainMod, Tab, cyclenext
bind = $mainMod, Tab, layoutmsg, swapwithmaster

# Cycle between tabs of tab group
bind = CTRL, Tab, changegroupactive, f 
bind = CTRL SHIFT, Tab, changegroupactive, b

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move active window with mainMod + SHIFT + vim keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


#######################################
# KEY BINDS FOR WORKSPACE INTERACTION #
#######################################

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

####################################
# KEY BINDS FOR SYSTEM INTERACTION #
####################################
bind = $mainMod, RETURN, exec, $term
bind = $mainMod, SPACE, exec, $launcher
bind = $mainMod, N, exec, [tag +fileExplorer] $fileExplorer
bind = $mainMod, B, exec, $browser 

bind = $mainMod, Q, killactive, 
bind = $mainMod SHIFT, Q, exit, #have a real shutdown menu pop up 
bind = $mainMod, E, exec, hyprlock

# Fn Key Binds
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind   = , Print, exec, grim -g "$(slurp -d)"

